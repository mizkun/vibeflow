# Vibe Coding Framework Version Information
framework:
  version: "6.0.0"
  name: "Iris-Only Architecture + Structured Spec (Story/Contract)"
  installed_at: "2026-05-18T00:00:00+09:00"

  # Version compatibility
  minimum_compatible: "5.0.0"

  # Features enabled
  features:
    simplified_state: true
    verification_system: true
    e2e_testing: true
    notifications: true
    hooks: true
    subagents: true
    skills: true
    access_guard: true
    safety_rules: true
    write_guard: true
    # v5 Iris-Only
    iris_only_architecture: true
    agent_dispatch: true
    cross_review: true
    auto_qa_judgment: true
    playwright_default: true
    issue_driven_workflow: true
    # v6 Structured Spec
    structured_spec: true
    spec_verify: true
    spec_gate: true

  # Claude Code integration
  claude_code:
    settings_file: ".claude/settings.json"
    hooks:
      - PreToolUse (validate_access.py)
      - PreToolUse (validate_write.sh)
      - PreToolUse (validate_step7a.py)
      - PostToolUse (task_complete.sh)
      - Stop (waiting_input.sh)
    skills:
      - vibeflow-kickoff
      - vibeflow-execute-issue
      - vibeflow-execute-all
      - vibeflow-issue-template
      - vibeflow-tdd
      - vibeflow-conclude
      - vibeflow-progress
      - vibeflow-healthcheck
      - vibeflow-ui-smoke
      - vibeflow-ui-explore
    subagents:
      - qa-acceptance
      - code-reviewer
      - test-runner

  # Project repository
  repository_url: "https://github.com/mizkun/vibeflow"
