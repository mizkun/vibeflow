# VibeFlow Policy Schema — Single Source of Truth
# This file defines role-based access permissions.
# Generators read this file to produce validate_access.py, settings.json, etc.

roles:
  iris:
    display_name: "Iris"
    can_read:
      - "vision.md"
      - "spec.md"
      - "plan.md"
      - ".vibe/context/**"
      - ".vibe/references/**"
      - ".vibe/archive/**"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - "src/**"
    can_write:
      - "vision.md"
      - "spec.md"
      - "plan.md"
      - ".vibe/context/*"
      - ".vibe/references/*"
      - ".vibe/archive/*"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    enforcement: hard

  product_manager:
    display_name: "Product Manager"
    can_read:
      - "vision.md"
      - "spec.md"
      - "plan.md"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - ".vibe/qa-reports/**"
    can_write:
      - "plan.md"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    enforcement: hard

  engineer:
    display_name: "Engineer"
    can_read:
      - "spec.md"
      - "src/**"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    can_write:
      - "src/*"
      - "tests/*"
      - "**/*.test.*"
      - "**/__tests__/*"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - ".vibe/test-results.log"
    enforcement: hard

  qa_engineer:
    display_name: "QA Engineer"
    can_read:
      - "spec.md"
      - "src/**"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - ".vibe/qa-reports/**"
    can_write:
      - ".vibe/qa-reports/*"
      - ".vibe/test-results.log"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    enforcement: hard

  infra_manager:
    display_name: "Infrastructure Manager"
    can_read:
      - ".vibe/hooks/**"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - ".claude/settings.json"
    can_write:
      - ".vibe/hooks/*"
      - "validate-write*"
      - "validate_write*"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    enforcement: hard

  human:
    display_name: "Human"
    can_read: []
    can_write:
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    enforcement: hard

# Files always allowed regardless of role
# project_state and session files are the primary state;
# state.yaml is kept as backward-compatible fallback
always_allow:
  - ".vibe/project_state.yaml"
  - ".vibe/sessions/*.yaml"
  - ".vibe/state.yaml"
