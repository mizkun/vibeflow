# VibeFlow Policy Schema — Single Source of Truth (v5 Iris-Only)
# This file defines role-based access permissions.
# Generators read this file to produce validate_access.py, settings.json, etc.

roles:
  iris:
    display_name: "Iris"
    can_read:
      - "vision.md"
      - "spec.md"
      - "plan.md"
      - ".vibe/context/**"
      - ".vibe/references/**"
      - ".vibe/archive/**"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - "src/**"
    can_write:
      - "vision.md"
      - "spec.md"
      - "plan.md"
      - ".vibe/**"
    enforcement: hard

  coding_agent:
    display_name: "Coding Agent (Claude Code / Codex)"
    can_read:
      - "spec.md"
      - "src/**"
      - "tests/**"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
    can_write:
      - "src/*"
      - "tests/*"
      - "**/*.test.*"
      - "**/__tests__/*"
      - ".vibe/project_state.yaml"
      - ".vibe/sessions/*.yaml"
      - ".vibe/state.yaml"
      - ".vibe/test-results.log"
    enforcement: hard

# Files always allowed regardless of role
always_allow:
  - ".vibe/project_state.yaml"
  - ".vibe/sessions/*.yaml"
  - ".vibe/state.yaml"
