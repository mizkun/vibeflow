# VibeFlow Workflow Schema — Single Source of Truth (v5 Iris-Only)
# Defines step sequences, roles, and modes for each workflow type.

workflows:
  standard:
    description: "Standard development workflow — Iris dispatches to Coding Agent, reviews results"
    steps:
      - id: 1_issue_review
        role: iris
        mode: solo
      - id: 2_task_breakdown
        role: iris
        mode: solo
      - id: 3_branch_creation
        role: coding_agent
        mode: solo
      - id: 4_test_writing
        role: coding_agent
        mode: solo
      - id: 5_implementation
        role: coding_agent
        mode: solo
      - id: 6_refactoring
        role: coding_agent
        mode: solo
      - id: 7_acceptance_test
        role: iris
        mode: solo
      - id: 8_pr_creation
        role: coding_agent
        mode: solo
      - id: 9_code_review
        role: iris
        mode: solo
      - id: 10_merge
        role: coding_agent
        mode: solo

  patch:
    description: "Lightweight patch loop for scoped fixes from QA/review feedback"
    steps:
      - id: 1_scope_review
        role: iris
        mode: solo
      - id: 2_fix_implementation
        role: coding_agent
        mode: solo
      - id: 3_targeted_test
        role: coding_agent
        mode: solo
      - id: 4_commit
        role: coding_agent
        mode: solo

  spike:
    description: "Exploration and discovery — produces decisions, not production code"
    steps:
      - id: 1_question_framing
        role: iris
        mode: solo
      - id: 2_exploration
        role: coding_agent
        mode: solo
      - id: 3_decision_summary
        role: iris
        mode: solo

  ops:
    description: "Non-development project tasks (release, docs, backlog grooming)"
    steps:
      - id: 1_task_review
        role: iris
        mode: solo
      - id: 2_execution
        role: iris
        mode: solo
      - id: 3_completion
        role: iris
        mode: solo
