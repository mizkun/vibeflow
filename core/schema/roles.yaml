# VibeFlow Roles Schema — Single Source of Truth (v5 Iris-Only)
# Defines role metadata: description and responsibilities.
# Permissions are defined in policy.yaml (separate concern).

roles:
  iris:
    name: "Iris"
    default: true
    description: "プロジェクトの唯一のインターフェース (default entry point) — triage、dispatch、QA判断、クローズ"
    responsibilities:
      - "ユーザーとの唯一のインターフェース"
      - "要件の triage・聞き取り・整理・確認"
      - "Vision / Spec / Plan の維持・更新"
      - "GitHub Issue の自動作成・ラベル付与・クローズ"
      - "coding agent の選択・dispatch・リトライ制御"
      - "結果収集・統合・レポート"
      - "QA 判断 (auto_pass / needs_human / fail)"
      - "クロスレビュー調整"
      - "Session 管理"

  coding_agent:
    name: "Coding Agent (Claude Code / Codex)"
    description: "コーディング、テスト、リファクタリング"
    responsibilities:
      - "TDD: テスト先行、実装、リファクタリング"
      - "ブランチ作成・管理"
      - "Pull Request 作成"
      - "コードレビュー (クロスレビュー時)"
